syntax = "proto2";

package apollo.planning.s_curve_planner;

// S-Curve Path Planning Configuration
message SCurvePlannerConfig {
  // Road configuration
  optional double road_width = 1 [default = 4.1];  // meters
  optional double s_curve_length = 2 [default = 80.0];  // meters
  optional double first_curve_diameter = 3 [default = 30.0];  // meters
  optional double second_curve_diameter = 4 [default = 22.0];  // meters
  optional double curve_center_offset = 5 [default = 2.0];  // meters

  // Vehicle configuration
  optional double vehicle_width = 10 [default = 2.9];  // meters
  optional double vehicle_length = 11 [default = 5.2];  // meters
  optional double wheelbase = 12 [default = 2.7];  // meters
  optional double max_steer_angle = 13 [default = 0.436];  // radians (25 degrees)
  optional double max_acceleration = 14 [default = 3.0];  // m/s²
  optional double max_deceleration = 15 [default = 3.5];  // m/s²

  // Kinematics configuration
  optional double max_velocity = 20 [default = 8.33];  // m/s (30 km/h)
  optional double max_curvature = 21 [default = 0.15];  // 1/m
  optional double max_centripetal_acceleration = 22 [default = 3.0];  // m/s²
  optional double safety_margin = 23 [default = 0.7];  // meters

  // Planning configuration
  optional double path_resolution = 30 [default = 0.1];  // meters
  optional double time_resolution = 31 [default = 0.05];  // seconds
  optional double planning_horizon = 32 [default = 30.0];  // seconds
  optional int32 smoothing_window = 33 [default = 5];  // points

  // Velocity planning configuration
  optional bool use_curvature_based = 40 [default = true];
  optional double curvature_velocity_gain = 41 [default = 8.0];
  optional double min_velocity = 42 [default = 1.0];  // m/s
  optional double max_velocity_change_rate = 43 [default = 0.5];  // m/s²

  // Obstacle configuration
  optional double collision_margin = 50 [default = 0.2];  // meters
  optional bool dynamic_obstacle_prediction = 51 [default = true];
  optional double prediction_horizon = 52 [default = 3.0];  // seconds

  // Debug configuration
  optional bool enable_visualization = 60 [default = true];
  optional bool save_trajectory = 61 [default = true];
  optional string output_directory = 62 [default = "./output"];
  optional bool verbose = 63 [default = true];
}
